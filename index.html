<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Website</title>
</head>
<body>
    <div class="entirePage">
        <h1>Student Registration Form</h1>
        <div class="registerSection">
            <form class="Form" id="regisForm"action="db.php" method="post" enctype="multipart/form-data">
                <h5>All fields must be filled</h5>
                <label for="Name">Name:</label>
                <input type="text" id="name" name="name" maxlength="40" required>
                <br><br>

                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" max="99" required>
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" maxlength="40" required>
                <br><br>

                <label for="course">Course:</label>
                <input type="text" id="course" name="course" maxlength="40" required>
                <br><br>

                <label>Year Level:</label><br>
                <div>
                    <input type="radio" id="first_year" name="year_level" value="1" required>
                    <label for="first_year">First Year</label>
                    <input type="radio" id="second_year" name="year_level" value="2" required>
                    <label for="second_year">Second Year</label>
                    <input type="radio" id="third_year" name="year_level" value="3" required>
                    <label for="third_year">Third Year</label>
                    <input type="radio" id="fourth_year" name="year_level" value="4" required>
                    <label for="fourth_year">Fourth Year</label>
                </div>
                <br><br>

                <div class="upload-section">
                    <p class="header-label">PROFILE PHOTO</p>
                    <input type="file" id="file-input" name="profile_photo" accept="image/*" required>
                </div>

                <br><br>
                <label for="graduate">Graduating this year?</label>
                <input type="checkbox" id="graduate" name="graduate" value="1">
                <br><br>
                <input class="Submit" type="submit" name="register" value="Submit">
            </form>
        </div>

        <div class="recordManagement">
            <h1>STUDENT RECORD MANAGEMENT SYSTEM</h1>
            <form action="db.php" method="POST">
                <h2>Student Record</h2>
                <div class="student-actions">
                    <input type="text" id="studentQueryRecord" name="student_query" placeholder="Enter Student Name or Number" required>
                    <br>
                    <button type="submit" id="search_student" name="search_student" class="ID btn-search">Search Student</button> <br>
                    <button type="submit" id="update_student" name="update_student" class="ID btn-update">Update Student</button> <br>
                    <button type="submit" id="delete_student" name="delete_student" class="ID btn-delete">Delete Student</button><br>
                </div>
            </form>
            <form action="db.php" method="POST">
                <h2>Accountability Record</h2>
                <div class="student-actions">
                    <input type="text" id="studentQueryAccountability" name="student_query" placeholder="Enter Student Name or Number" required><br>
                    <button type="submit" id="add_acc" name="add_acc" class="Name btn-update">Add Accountability</button> <br>
                    <button type="submit" id="display_acc"name="display_acc" class="Name btn-search">Display Accountability</button> <br>
                    <button type="submit" id="update_acc" name="update_acc" class="Name btn-update">Update Accountability</button> <br>

                </div>
            </form>
                
        </div>

        <template class="templateAccountability">
            <form class="Form2" id="accForm" action="db.php" method="post" enctype="multipart/form-data">
                <h5>All fields must be filled</h5>
                <br><br>
                <label for="Title">Title:</label>
                <input type="text" id="title" name="title" maxlength="100" required>
                <br><br>
                <label for="Amount">Amount:</label>
                <input type="number" step="0.01" min="0" max="99999999.99" placeholder="0.00" id="amount" name="amount" required>
                <br><br>
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="Pending" selected>Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Completed">Completed</option>
                </select>
                <input class="Submit" type="submit2" name="register2" value="Submit">
            </form>
        </template>
        

    </div>
</body>
</html>
