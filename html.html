<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <title>Website</title>
    </head>
    <body>
        <h1> User Registration Form</h1>
        <form class="Form" id="regisForm" action="db.php" method="post" enctype="multipart/form-data">
            <label class="Name"for="Name">Name:</label>
            <input type="text" id="name" name="name" maxlength="40" required>
            <br><br>
            <label class="Age"for="age">Age:</label>
            <input type="number" id="age" name="age" maxlength="2" required>
            <br><br>
            <label class="Email" for="email">Email:</label>
            <input type="email" id="email" name="email" maxlength="40" required>
            <br><br>
            <label class="Course" for="course">Course:</label>
            <input type="text" id="course" name="course" maxlength="40" required>
            <br><br>
            <label class="YearLevel" for="year_level">Year Level:</label>
            <div>
                <input type="radio" id="first_year" name="year_level" value="1" required>
                <label for="first_year">First Year</label>
                <input type="radio" id="second_year" name="year_level" value="2" required>
                <label for="second_year">Second Year</label>
                <input type="radio" id="third_year" name="year_level" value="3" required>
                <label for="third_year">Third Year</label>
                <input type="radio" id="fourth_year" name="year_level" value="4" required>
                <label for="fourth_year">Fourth Year</label>
            </div>
            <label class="Avatar" for="avatar">Choose an avatar:</label>
            <div>
                
                <input type="radio" id="avatar1" name="avatar" value="avatar1.jpg" required>
                <img src="Images/avatar1.jpg" alt="Avatar 1" width="100">
                
                <input type="radio" id="avatar2" name="avatar" value="avatar2.jpg" required>
                <img src="Images/avatar2.jpg" alt="Avatar 2" width="100">
                
                <input type="radio" id="avatar3" name="avatar" value="avatar3.jpg" required>
                <img src="Images/avatar3.jpg" alt="Avatar 3" width="100">
            </div>
            <br><br>
            <label class="Graduate" for="graduate">Graduating this year?</label>
            <input type="checkbox" id="graduate" name="graduate" value="yes">
            <br><br>
            <input class="Submit"type="submit" value="Submit">
            <input class="Submit" type="submit" name="update" value="Update">
            <input class="Submit" type="submit" name="delete" value="Delete">
        </form>
    </body>
</html>
